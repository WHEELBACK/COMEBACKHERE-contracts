# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny crates with known security vulnerabilities
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
  # Unmaintained-status notices (not vulnerabilities) pulled in transitively
  # via soroban-env-host's ark-* / soroban-wasmi dependency tree; not
  # something we can address from this repo.
  "RUSTSEC-2024-0436", # paste, via ark-ff/ark-ec/ark-bls12-381
  "RUSTSEC-2024-0388", # derivative, via ark-ff/ark-ec/ark-bls12-381
]

[licenses]
version = 2
# Allow common permissive and copyleft-compatible licenses
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "0BSD",
]

[bans]
# Deny duplicate versions of the same crate where possible
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
