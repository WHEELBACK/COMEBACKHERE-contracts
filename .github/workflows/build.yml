name: WASM Build Check

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build compliance contract (WASM)
        run: cargo build --target wasm32-unknown-unknown --release -p comebackhere-compliance

      - name: Build invoice contract (WASM)
        run: cargo build --target wasm32-unknown-unknown --release -p comebackhere-invoice

      - name: Build treasury contract (WASM)
        run: cargo build --target wasm32-unknown-unknown --release -p comebackhere-treasury
